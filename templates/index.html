<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Security Scanner | فاحص الروابط الآمن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0f172a; /* لون داكن احترافي */
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .scanner-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 2.5rem;
        }
        .btn-scan {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            border: none;
            padding: 0.8rem 2rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-scan:hover {
            transform: scale(1.05);
            color: white;
        }
        .result-box {
            background: #0f172a;
            border-right: 4px solid #3b82f6;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-top: 2rem;
        }
        .security-icon {
            font-size: 3rem;
            color: #3b82f6;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5 text-center">
            <div class="scanner-card">
                <div class="security-icon">🛡️</div>
                <h2 class="fw-bold mb-4">QR Security Scanner</h2>
                <p class="text-secondary mb-4">قم برفع صورة الـ QR للتحقق من سلامة الرابط عبر VirusTotal</p>
                
                <form method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <input class="form-control form-control-lg bg-dark text-white border-secondary" type="file" name="file" id="formFile">
                    </div>
                    <button type="submit" class="btn btn-scan btn-lg w-100 text-white">ابدأ الفحص الآن</button>
                </form>

                {% if result %}
                <div class="result-box text-start">
                    <h5 class="text-info mb-2">النتيجة النهائية:</h5>
                    <p class="mb-0 fs-5">{{ result }}</p>
                </div>
                {% endif %}
            </div>
            <p class="mt-4 text-muted small">© 2026 QR Security Lab | Powered by VirusTotal API</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
